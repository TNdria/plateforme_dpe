{% extends 'base.html' %}
{% load static %}
{% block style %}
        <style>
            body {
                background:#36b9cc;
            }
            .btn-color{
            background-color: #0e1c36;
            color: #fff;
            
            }
            .profile-image-pic{
            height: 150px;
            width: 150px;
            object-fit: cover;
            }

            .cardbody-color{
            background-color: #ebf2fa;
            }
            a{
            text-decoration: none;
            }
        </style>
{% endblock %}
{% block title %} PROFIL UTILISATEUR {% endblock %}
{% block container_fluid %} 
        <div class="container">
            <div class="row">
            <div class="col-md-6 offset-md-3">
                <h2 class="text-center text-dark mt-2">Profil utilisateur</h2>
                <div class="text-center mb-1 text-dark"></div>
                <div class="card my-1">
                <form class="card-body cardbody-color p-lg-3"  method="post">
                    {% csrf_token %}
                    {% if message %}
                    <div class="{{ message.class }} text-center mb-3">
                        {{ message.text }}
                    </div>
                    {% endif %}
                    <div class="text-center">
                        <!-- <i class="fas fa-user-lock fa-3x"></i> 
                    <img src="{% static 'user_login.png' %}" class="img-fluid profile-image-pic img-thumbnail rounded-circle my-3"
                        width="150px" alt="profile">
                        -->
                    </div>

                    <div class="mb-3">
                        <input type="text" pattern="[a-z0-9_]+" value="{{ user.username }}" readOnly class="form-control" name="username" required placeholder="Nom d'utilisateur">
                    </div>
                    <div class="mb-3">
                        <input type="text" pattern="[a-zA-Z0-9_ ]+" value="{% if infos %}{{ info.first_name }}{% else %}{{ user.first_name }}{% endif %}" class="form-control" name="first_name" placeholder="Nom" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" value="{% if infos %}{{ info.first_name }}{% else %}{{ user.last_name }}{% endif %}"  name="last_name" placeholder="Prénom(s)">
                    </div>
                    <div class="mb-3">
                        <input type="password" pattern=".{4,}" value="" required name="password" placeholder="Mot de passe actuel [*Obligatoire]" class="form-control">
                    </div>
                    <div class="divider"><hr/></div>
                    <div class="mb-3">
                        <input type="password" pattern=".{4,}" value="" name="new_password" placeholder="Nouveau mot de passe [optionnel]" class="form-control">
                    </div>
                    <div class="mb-3">
                        <input type="password" pattern=".{4,}" value="" name="new_password2" placeholder="Confirmer le nouveau mot de passe" class="form-control">
                    </div>
                    <input type="hidden" name="dren" value="{{ user.dren }}" id="dren">
                    <input type="hidden" name="cisco" value="{{ user.cisco }}"id="cisco">
                    <div class="text-center"><button type="submit" class="btn btn-color px-5 mb-5 w-100">Enregistrer</button></div>
                </form>
                </div>
            </div>
            </div>
        </div>
 {% endblock %}
 {% block scripts %}
    <script>
        $("#accordionSidebar").removeClass("toggled").addClass("toggled")
    </script>
 {% endblock %}
